name: Build Android APK

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FLUTTER_VERSION: stable
  APP_NAME: real-life-side-quest

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve version info
        id: version
        shell: bash
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=${VERSION_LINE%%+*}
          VERSION_BUILD=${VERSION_LINE##*+}

          if [ "$VERSION_NAME" = "$VERSION_LINE" ]; then
            VERSION_BUILD=${{ github.run_number }}
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_build=$VERSION_BUILD" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --build-name "${{ steps.version.outputs.version_name }}" \
            --build-number "${{ steps.version.outputs.version_build }}"

      - name: Rename APK with app and version
        shell: bash
        run: |
          SOURCE_APK="build/app/outputs/flutter-apk/app-release.apk"
          TARGET_APK="build/app/outputs/flutter-apk/${APP_NAME}-v${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_build }}.apk"
          mv "$SOURCE_APK" "$TARGET_APK"
          echo "Renamed APK: $TARGET_APK"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-v${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_build }}
          path: build/app/outputs/flutter-apk/${{ env.APP_NAME }}-v${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_build }}.apk
          if-no-files-found: error
          retention-days: 5
