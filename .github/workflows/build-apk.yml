name: Build Android APK

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.24.5"
  APP_NAME: real-life-side-quest
  ANDROID_NDK_VERSION: "27.0.12077973"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dkotlin.daemon.jvm.options=-Xmx2g -Dfile.encoding=UTF-8"

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        shell: bash
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Accept Android SDK licenses
        shell: bash
        run: yes | sdkmanager --licenses

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter doctor -v
          flutter build apk --release

      - name: Verify APK output
        shell: bash
        run: |
          test -f build/app/outputs/flutter-apk/app-release.apk
          ls -lah build/app/outputs/flutter-apk/

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs-${{ github.run_number }}
          path: |
            build/**/outputs/**/*.txt
            build/**/reports/**
            android/**/build/reports/**
            /home/runner/.gradle/daemon/**/daemon-*.out.log
          if-no-files-found: ignore
          retention-days: 5

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-release-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 5
